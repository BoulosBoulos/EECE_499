# Reward per System_Architecture.txt sec 9
# Env uses: w_prog, w_time, w_risk, w_coll, ttc_thr, d_coll, w_pothole
# Stronger w_risk/w_coll so policy learns to stop for peds/vehicles
w_prog: 1.0       # progress reward per m
w_time: -0.1      # time penalty per step
w_risk: -3.0      # penalty when TTC < ttc_thr (stronger to encourage stopping)
w_rule: -2.0      # ROW violation (not yet implemented)
w_coll: -20.0     # collision penalty per step (uses SUMO collision events + proximity)
w_switch: -0.05   # action switching (not yet implemented)
w_comfort: -0.01  # acceleration magnitude (not yet implemented)
w_jerk: -0.02     # jerk penalty (not yet implemented)
ttc_thr: 3.0      # TTC threshold (s)
d_coll: 2.0       # distance (m) for proximity collision check
w_pothole: -5.0   # penalty for driving over pothole (randomly placed each episode)
