# Physics-informed RL: plug-and-play residual configuration
# ─── PINN placement ────────────────────────────────────────────────────────
# pinn_placement: "critic" | "actor" | "both" | "none"
# Default: critic (Design A). Set in code via --pinn_placement or variant.

# ─── Per-residual weights (critic and actor PINN) ──────────────────────────
lambda_physics_critic: 0.5   # overall weight for critic physics loss (Design A)
lambda_physics_actor: 0.1    # overall weight for actor physics loss (Design B)
lambda_physics_ttc: 1.0      # TTC violation weight
lambda_physics_stop: 1.0     # stopping-distance violation weight
lambda_physics_fric: 1.0     # friction-circle violation weight
lambda_physics_ego: 0.1      # ego dynamics (L_ego) weight; used when use_l_ego=True

# ─── Physics constants ─────────────────────────────────────────────────────
physics_ttc_thr: 3.0         # TTC threshold (s) for "dangerous"
physics_tau: 0.5             # reaction time (s) for stopping distance
mu: 0.8                      # friction coefficient
g: 9.81                      # gravitational acceleration (m/s^2)
a_max: 5.0                   # max deceleration (m/s^2)
a_brake: 5.0                 # braking deceleration for PhysicsPredictor
v_creep: 1.0                 # creep target speed (m/s)
a_go: 2.0                    # GO action acceleration (m/s^2)
dt: 0.1                      # control step (s)

# ─── Safety filter ─────────────────────────────────────────────────────────
# use_safety_filter: false (set in code via --use_safety_filter or variant)
# Filter checks: d_cz < d_stop(v) and friction circle. Overrides action to STOP.

# ─── Legacy (kept for backward compat) ────────────────────────────────────
lambda_ego: 0.05
lambda_stop: 0.01
lambda_fric: 0.01
lambda_risk: 0.01
eta: 0.5
